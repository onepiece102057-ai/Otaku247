<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Otaku 24/7 – Portal Dinámico</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/js-yaml/4.1.0/js-yaml.min.js"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;700;900&display=swap');
        :root { --primary: #bc13fe; --bg-dark: #05000a; }
        body { margin: 0; font-family: 'Poppins', sans-serif; background-color: var(--bg-dark); color: white; transition: 0.8s; }
        section { min-height: 100vh; padding: 100px 20px; }
        .portal-card { background: rgba(255, 255, 255, 0.03); border: 2px solid var(--primary); box-shadow: 0 0 20px var(--primary); border-radius: 30px; backdrop-filter: blur(10px); overflow: hidden; }
        .neon-text { color: var(--primary); text-shadow: 0 0 15px var(--primary); }
        nav { background: rgba(0,0,0,0.9); border-bottom: 1px solid var(--primary); position: fixed; top: 0; w-full; z-50; width: 100%; }
        .hidden { display: none !important; }
    </style>
</head>
<body>

    <nav class="py-4 px-8 flex justify-between items-center">
        <div class="font-900 text-xl neon-text uppercase">O24/7</div>
        <div class="flex gap-6 text-[10px] font-bold uppercase">
            <a href="#inicio">Inicio</a>
            <a href="#noticias" class="text-orange-500">Noticias</a>
            <a href="/admin/" class="bg-white text-black px-2 py-1 rounded">PANEL ADMIN</a>
        </div>
    </nav>

    <section id="inicio" class="flex flex-col items-center justify-center text-center">
        <h1 class="text-7xl font-900 neon-text mb-4 italic">PORTAL ACTIVO</h1>
        <p class="text-gray-500 tracking-[1em] text-xs">SISTEMA DE NOTICIAS AUTOMÁTICO</p>
    </section>

    <section id="noticias" data-color="#f59e0b" data-bg="#1a0d00">
        <div class="max-w-6xl mx-auto w-full">
            <h2 class="text-5xl font-900 text-[#f59e0b] mb-12 text-center italic">ÚLTIMOS ARCHIVOS</h2>
            <div id="news-feed" class="grid grid-cols-1 md:grid-cols-3 gap-8">
                <p class="text-center col-span-full text-gray-600">Sincronizando con el servidor...</p>
            </div>
        </div>
    </section>

    <script>
        // CONFIGURACIÓN DE TU REPO
        const username = "onepiece102057-ai";
        const repo = "Otaku247";
        const folder = "_noticias";

        async function fetchNews() {
            const container = document.getElementById('news-feed');
            try {
                // 1. Obtener lista de archivos en _noticias
                const response = await fetch(`https://api.github.com/repos/${username}/${repo}/contents/${folder}`);
                const files = await response.json();
                
                if (files.length === 0 || files.message === "Not Found") {
                    container.innerHTML = "<p class='text-center col-span-full'>No hay noticias publicadas aún.</p>";
                    return;
                }

                container.innerHTML = ""; // Limpiar cargando

                // 2. Leer cada archivo .md o .yml
                for (const file of files) {
                    if (file.name === ".gitkeep") continue;

                    const contentRes = await fetch(file.download_url);
                    const rawContent = await contentRes.text();
                    
                    // Extraer el Frontmatter (el texto entre ---)
                    const parts = rawContent.split('---');
                    if (parts.length >= 3) {
                        const data = jsyaml.load(parts[1]); // Convertir YAML a Objeto JS
                        
                        const card = `
                            <div class="portal-card group">
                                <img src="${data.image || 'https://via.placeholder.com/400x200'}" class="w-full h-40 object-cover opacity-60">
                                <div class="p-6">
                                    <span class="bg-orange-500 text-black text-[9px] font-black px-2 py-1 rounded mb-4 inline-block">NOTICIA</span>
                                    <h3 class="font-bold text-lg mb-2 text-orange-400">${data.title}</h3>
                                    ${data.video_id ? `<iframe class="w-full h-32 mb-4" src="https://www.youtube.com/embed/${data.video_id}" frameborder="0"></iframe>` : ''}
                                    <p class="text-xs text-gray-400 mb-4">${parts[2].substring(0, 100)}...</p>
                                    <button class="text-[10px] font-black border-b border-orange-500">ACCEDER →</button>
                                </div>
                            </div>
                        `;
                        container.innerHTML += card;
                    }
                }
            } catch (error) {
                console.error("Error al cargar noticias:", error);
                container.innerHTML = "<p class='text-center col-span-full text-red-500'>Error de conexión con el portal.</p>";
            }
        }

        window.onload = fetchNews;
    </script>
</body>
</html>
