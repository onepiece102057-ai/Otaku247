<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Otaku 24/7 – Sistema Pro-Portal</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;700;900&display=swap');

        :root {
            --primary: #bc13fe;
            --bg-dark: #05000a;
        }

        body {
            margin: 0;
            font-family: 'Poppins', sans-serif;
            background-color: var(--bg-dark);
            color: white;
            transition: background-color 0.8s ease;
        }

        /* --- ESTILOS DE PORTALES --- */
        section { min-height: 100vh; padding: 100px 20px; transition: 0.8s; }
        
        .portal-card {
            background: rgba(255, 255, 255, 0.03);
            border: 2px solid var(--primary);
            box-shadow: 0 0 20px var(--primary);
            border-radius: 30px;
            backdrop-filter: blur(10px);
            overflow: hidden;
            transition: 0.5s;
        }

        .neon-text {
            color: var(--primary);
            text-shadow: 0 0 15px var(--primary);
        }

        nav { background: rgba(0,0,0,0.9); border-bottom: 1px solid var(--primary); }
        
        .hidden { display: none !important; }

        /* Animación para las noticias */
        .news-entry { animation: fadeIn 0.5s ease forwards; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(20px); } to { opacity: 1; transform: translateY(0); } }
    </style>
</head>
<body>

    <div id="login-screen" class="fixed inset-0 z-[10000] flex items-center justify-center bg-black">
        <div class="portal-card p-12 text-center border-[#bc13fe]">
            <h1 class="text-5xl font-900 text-[#bc13fe] mb-8 italic">OTAKU 24/7</h1>
            <button onclick="login()" class="px-12 py-3 bg-[#bc13fe] text-white font-black rounded-full hover:scale-110 transition">CONECTAR</button>
        </div>
    </div>

    <nav class="fixed top-0 w-full z-50 py-4 px-8 flex justify-between items-center transition-all">
        <div class="font-900 text-xl neon-text">O24/7</div>
        <div class="flex gap-6 text-[10px] font-bold uppercase">
            <a href="#inicio">Inicio</a>
            <a href="#anime">Anime</a>
            <a href="#gaming">Gaming</a>
            <a href="#noticias" class="text-orange-500">Noticias</a>
            <a href="#apoyo" class="text-yellow-500">Apoyo</a>
            <button onclick="logout()" class="text-red-500 ml-4">Salir</button>
        </div>
    </nav>

    <div id="main-portal" class="hidden">
        
        <section id="inicio" data-color="#bc13fe" data-bg="#05000a" class="flex flex-col items-center justify-center">
            <h2 class="text-7xl font-900 neon-text mb-4 uppercase">Portal Alpha</h2>
            <p class="text-gray-500 tracking-[1em] text-xs">MUNDO ISEKAI OSCURO</p>
        </section>

        <section id="anime" data-color="#ff2fb2" data-bg="#1a050d">
            <div class="max-w-4xl mx-auto w-full text-center">
                <h2 class="text-5xl font-900 neon-text mb-12">ANIME INTEL</h2>
                <div class="grid md:grid-cols-2 gap-4">
                    <div class="portal-card p-6 italic">Solo Leveling S2 - Arcs confirmed</div>
                    <div class="portal-card p-6 italic">One Piece - Elbaf Visuals</div>
                </div>
            </div>
        </section>

        <section id="gaming" data-color="#2563eb" data-bg="#000d1a">
            <div class="portal-card p-12 max-w-2xl mx-auto text-center">
                <h2 class="text-4xl font-900 neon-text mb-4 uppercase">Gremio Gaming</h2>
                <p class="text-2xl font-black mb-8">ID: Morgana#22143</p>
                <button onclick="copyID()" class="bg-[#2563eb] px-8 py-2 rounded-full font-bold">COPIAR BATTLE.NET</button>
            </div>
        </section>

        <section id="noticias" data-color="#f59e0b" data-bg="#1a0d00">
            <div class="max-w-6xl mx-auto w-full">
                <h2 class="text-5xl font-900 neon-text mb-12 text-center italic">NOTICIAS DEL SISTEMA</h2>
                <div id="news-container" class="grid grid-cols-1 md:grid-cols-3 gap-8">
                    </div>
            </div>
        </section>

        <section id="apoyo" data-color="#d4af37" data-bg="#0a0a05">
            <div class="portal-card p-12 max-w-xl mx-auto text-center">
                <h2 class="text-4xl font-900 neon-text mb-6">Misión de Apoyo</h2>
                <div class="flex flex-col gap-4">
                    <button class="bg-[#d4af37] text-black py-4 rounded-xl font-black">PAYPAL</button>
                    <button class="border border-[#d4af37] text-[#d4af37] py-4 rounded-xl font-bold">PATREON</button>
                </div>
            </div>
        </section>

    </div>

    <script>
        // --- BASE DE DATOS JSON (Edita esto para cambiar noticias) ---
        const noticiasData = [
            {
                "titulo": "Solo Leveling: S2 Confirmada",
                "resumen": "El despertar del monarca de las sombras llega este invierno.",
                "etiqueta": "URGENTE",
                "colorEtiqueta": "bg-red-600",
                "imagen": "https://via.placeholder.com/400x200/1a0d00/f59e0b?text=ANIME+NEWS"
            },
            {
                "titulo": "Actualización Portal v2.6",
                "resumen": "Mejoras en la estabilidad del servidor y nuevos efectos neón.",
                "etiqueta": "SISTEMA",
                "colorEtiqueta": "bg-blue-600",
                "imagen": "https://via.placeholder.com/400x200/1a0d00/f59e0b?text=SISTEMA"
            },
            {
                "titulo": "Misterio en Elbaf",
                "resumen": "Nuevas teorías sobre el tesoro de los gigantes en One Piece.",
                "etiqueta": "MANGA",
                "colorEtiqueta": "bg-orange-500",
                "imagen": "https://via.placeholder.com/400x200/1a0d00/f59e0b?text=MANGA"
            }
        ];

        // --- CARGAR NOTICIAS DINÁMICAMENTE ---
        function cargarNoticias() {
            const container = document.getElementById('news-container');
            container.innerHTML = noticiasData.map(post => `
                <div class="portal-card news-entry group">
                    <img src="${post.imagen}" class="w-full h-40 object-cover opacity-60">
                    <div class="p-6">
                        <span class="${post.colorEtiqueta} text-[9px] font-black px-2 py-1 rounded mb-4 inline-block">${post.etiqueta}</span>
                        <h3 class="font-bold text-lg mb-2">${post.titulo}</h3>
                        <p class="text-xs text-gray-400 mb-4">${post.resumen}</p>
                        <button class="text-[10px] font-black hover:text-orange-500">LEER ARCHIVO →</button>
                    </div>
                </div>
            `).join('');
        }

        // --- LÓGICA DE SESIÓN Y SCROLL ---
        function login() {
            document.getElementById('login-screen').classList.add('hidden');
            document.getElementById('main-portal').classList.remove('hidden');
            localStorage.setItem('auth_o247', 'true');
            cargarNoticias(); // Cargamos las noticias al entrar
        }

        function logout() {
            document.getElementById('login-screen').classList.remove('hidden');
            document.getElementById('main-portal').classList.add('hidden');
            localStorage.removeItem('auth_o247');
        }

        // Cambio de color al hacer scroll
        const sections = document.querySelectorAll('section');
        window.addEventListener('scroll', () => {
            sections.forEach(sec => {
                const top = window.scrollY;
                const offset = sec.offsetTop - 300;
                if (top >= offset) {
                    document.documentElement.style.setProperty('--primary', sec.getAttribute('data-color'));
                    document.documentElement.style.setProperty('--bg-dark', sec.getAttribute('data-bg'));
                }
            });
        });

        window.onload = () => {
            if (localStorage.getItem('auth_o247') === 'true') login();
        }

        function copyID() {
            navigator.clipboard.writeText('Morgana#22143');
            alert('ID de Battle.net copiado');
        }
    </script>
</body>
</html>
