<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Otaku 24/7</title>

    <style>
        body {
            margin: 0;
            font-family: Arial, sans-serif;
            background: #0a0a0f;
            color: white;
        }

        /* NAVBAR */
        header {
            background: #111;
            padding: 15px 30px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            position: sticky;
            top: 0;
            z-index: 10;
        }

        nav a {
            margin: 0 12px;
            color: #ff2fb2;
            text-decoration: none;
            font-weight: bold;
        }

        /* HERO */
        .hero {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 60px 40px;
        }

        .hero-text {
            max-width: 50%;
        }

        .hero h1 {
            font-size: 40px;
            margin-bottom: 10px;
        }

        .hero p {
            font-size: 18px;
            margin-bottom: 20px;
        }

        .btn {
            background: #ff2fb2;
            padding: 12px 25px;
            border-radius: 8px;
            border: none;
            color: white;
            font-size: 18px;
            cursor: pointer;
        }

        .hero img {
            width: 380px;
            border-radius: 10px;
        }

        /* SECCIONES */
        section {
            padding: 40px 20px;
        }

        h2 {
            border-left: 4px solid #ff2fb2;
            padding-left: 10px;
            margin-bottom: 20px;
        }

        .grid {
            display: grid;
            gap: 15px;
        }

        @media(min-width: 800px) {
            .grid-3 { grid-template-columns: repeat(3, 1fr); }
            .grid-2 { grid-template-columns: repeat(2, 1fr); }
        }

        .card {
            background: #1a1a22;
            padding: 15px;
            border-radius: 10px;
        }

        /* CHIBI */
        .chibi {
            position: fixed;
            bottom: 20px;
            left: 20px;
            font-size: 40px;
            animation: flotar 3s infinite ease-in-out;
        }

        @keyframes flotar {
            0%,100% { transform: translateY(0); }
            50% { transform: translateY(-10px); }
        }
    </style>
</head>

<body>

<header>
    <div><strong>Otaku 24/7</strong></div>
    <nav>
        <a href="#inicio">Inicio</a>
        <a href="#anime">Anime</a>
        <a href="#gaming">Gaming</a>
        <a href="#terror">Terror</a>
        <a href="#noticias">Noticias</a>
        <a href="#creadores">Creadores</a>
        <a href="#apoyar">Apoyar</a>
    </nav>
</header>

<div class="chibi">🧙‍♂️</div>

<!-- HERO -->
<section class="hero" id="inicio">
    <div class="hero-text">
        <h1>BIENVENIDO A OTAKU 24/7</h1>
        <p>Tu plataforma definitiva para Anime, Gaming y Terror.  
        Transmitiendo contenido premium las 24 horas.</p>
        <button class="btn">Ver Ahora</button>
    </div>

    <img src="https://i.imgur.com/4ZQZ4Zy.png" alt="Personaje anime">
</section>

<!-- DESTACADOS -->
<section id="destacados">
    <h2>Destacados</h2>

    <div class="grid grid-3">
        <div class="card"><h3>Re:Zero</h3></div>
        <div class="card"><h3>Silent Hill</h3></div>
        <div class="card"><h3>Genshin Impact</h3></div>
    </div>
</section>

</body>
</html>
